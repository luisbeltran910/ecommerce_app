name: ecommerce_app
description: "E-Commerce App made in Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Secure Storage (JWT tokens)
  flutter_secure_storage: ^10.0.0

  # Navigation
  go_router: ^17.1.0

  # Local Storage
  hive_flutter: ^1.1.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
